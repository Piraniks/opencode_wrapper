services:
  opencode_wrapper:
    build: .
    container_name: opencode_wrapper
    runtime: sysbox-runc
    tty: true
    stdin_open: true
    init: true
    environment:
      OPENCODE_DISABLE_AUTO_UPDATE: "1"
    volumes:
      - "${OPENCODE_WORKDIR:-$PWD}:/workdir"
      - ./config:/root/.config/opencode
      - ./data:/root/.local/share/opencode
