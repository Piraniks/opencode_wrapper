services:
  opencode_wrapper:
    build: .
    container_name: opencode_wrapper
    runtime: sysbox-runc
    tty: true
    stdin_open: true
    init: true
    environment:
      OPENCODE_DISABLE_AUTO_UPDATE: "1"
      UID: "${UID:-1000}"
      GID: "${GID:-1000}"
      XDG_CONFIG_HOME: /opencode_config
      XDG_DATA_HOME: /opencode_data
      XDG_CACHE_HOME: /tmp/opencode-cache
      XDG_STATE_HOME: /opencode_data/opencode/state
    volumes:
      - "${OPENCODE_WORKDIR:-$PWD}:/workdir"
      - ./config:/opencode_config/opencode
      - ./data:/opencode_data/opencode
